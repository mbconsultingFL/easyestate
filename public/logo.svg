  <line x1="123" y1="55" x2="141" y2="55" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <line x1="123" y1="61" x2="141" y2="61" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <line x1="123" y1="67" x2="135" y2="67" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
